services:
  - type: web
    runtime: static
    name: ornithologique-web
    rootDir: my-app
    buildCommand: pnpm install && pnpm build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_IMAGE_BUCKET
        value: bird-images
      - key: VITE_SUPABASE_DETECT_FUNCTION
        value: detect-bird
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
